<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigada — Tríade do Legado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #111E29;
      --gold: #BC9B5F;
      --white: #FFFFFF;
      --off-white: #EAEAEA;
      --muted: #6B7680;
    }
    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .wrap { max-width: 520px; }
    .gold-line {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 32px;
    }
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 6vw, 48px);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    .body-text {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
      margin-bottom: 40px;
    }
    .mantra {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--gold);
      line-height: 1.7;
    }
    .footer {
      margin-top: 56px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="gold-line"></div>
    <h1 class="heading">Obrigada pelas respostas.</h1>
    <p class="body-text">
      Esse é o seu ponto de partida — e já é um ato de coragem.<br>
      Em breve, Bárbara entrará em contato.
    </p>
    <p class="mantra">
      Honre o seu passado.<br>
      Faça parte do presente.<br>
      Construa o seu legado.
    </p>
    <div class="footer">Tríade do Legado · Bárbara Quercetti</div>
  </div>
</body>
</html>
